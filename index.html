<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no>
    <title>手機管控系統 MDM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #000000;
            background-image: url('bg2.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000;
        }

        /* 中央大時間的區塊 */
        .main-time-container {
            position: absolute;
            top: 33.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            background-color: transparent; 
            padding: 5px 0;
        }

        #live-time {
            font-size: 11.5vw; 
            font-weight: 700;
            letter-spacing: -1px; 
            /* 左右(X)縮小為 85%，上下(Y)縮小為 90% */
            transform: scale(0.9, 0.9); 
            display: inline-block; 
            position: relative; 
            z-index: 2;
        }

        /* 下方上鎖時間的區塊 */
        .lock-time-container {
            position: absolute;
            top: 82.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            background-color: transparent; 
            padding: 2px 0;
        }

        #lock-time {
            font-size: 5vw;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="main-time-container">
        <div id="live-time">00/00 00:00:00</div>
    </div>

    <div class="lock-time-container">
        <div id="lock-time">上鎖時間：00/00 00:00:00</div>
    </div>

    <script>
        // --- 1. 設定固定的上鎖時間 (開啟網頁時動態計算一次) ---
        const initTime = new Date();
        // 往前推 8 分鐘 23 秒
        const lockTime = new Date(initTime.getTime() - (8 * 60 + 23) * 1000); 
        
        const lMonth = String(lockTime.getMonth() + 1).padStart(2, '0');
        const lDate = String(lockTime.getDate()).padStart(2, '0');
        const lHours = String(lockTime.getHours()).padStart(2, '0');
        const lMinutes = String(lockTime.getMinutes()).padStart(2, '0');
        const lSeconds = String(lockTime.getSeconds()).padStart(2, '0');
        
        document.getElementById('lock-time').textContent = `上鎖時間：${lMonth}/${lDate} ${lHours}:${lMinutes}:${lSeconds}`;

        // --- 2. 設定即時跳動的當前時間 ---
        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('live-time').textContent = `${month}/${date} ${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
