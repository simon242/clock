<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機管控系統 MDM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 將你的圖片設定為背景，強制填滿螢幕 */
            background-image: url('bg.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000;
        }

        /* 覆蓋中央大時間的區塊 */
        .main-time-container {
            position: absolute;
            top: 39.5%; /* 垂直位置，若有偏移請微調這裡的 % 數 */
            left: 0;
            width: 100%;
            text-align: center;
            /* 使用與圖片相同的綠色來蓋住原圖上的文字 */
            background-color: #72d54a; 
            padding: 5px 0;
        }

        #live-time {
            font-size: 11.5vw; /* 字體大小 */
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 覆蓋下方上鎖時間的區塊 */
        .lock-time-container {
            position: absolute;
            top: 82.5%; /* 垂直位置，若有偏移請微調這裡的 % 數 */
            left: 0;
            width: 100%;
            text-align: center;
            background-color: #72d54a; 
            padding: 2px 0;
        }

        #lock-time {
            font-size: 5vw;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
        }
    </style>
</head>
<body>

    <div class="main-time-container">
        <div id="live-time">00/00 00:00:00</div>
    </div>

    <div class="lock-time-container">
        <div id="lock-time">上鎖時間：00/00 00:00:00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 格式化主時間 (MM/DD HH:MM:SS)
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('live-time').textContent = `${month}/${date} ${hours}:${minutes}:${seconds}`;

            // 產生一個固定的「上鎖時間」，這裡設定為比現在早 8 分鐘 23 秒
            const lockTime = new Date(now.getTime() - (8 * 60 + 23) * 1000);
            const lMonth = String(lockTime.getMonth() + 1).padStart(2, '0');
            const lDate = String(lockTime.getDate()).padStart(2, '0');
            const lHours = String(lockTime.getHours()).padStart(2, '0');
            const lMinutes = String(lockTime.getMinutes()).padStart(2, '0');
            const lSeconds = String(lockTime.getSeconds()).padStart(2, '0');
            
            document.getElementById('lock-time').textContent = `上鎖時間：${lMonth}/${lDate} ${lHours}:${lMinutes}:${lSeconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
