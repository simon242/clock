<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機管控系統 MDM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('bg2.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000;
        }

        /* 中央大時間的區塊 (背景透明) */
        .main-time-container {
            position: absolute;
            top: 33.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            background-color: transparent; 
            padding: 5px 0;
        }

        #live-time {
            font-size: 11.5vw; 
            font-weight: 700;
            letter-spacing: -1px; /* 稍微拉緊字與字之間的距離 */
            transform: scale(0.75,0.75); /* 將文字左右壓縮成原本的 85% */
            display: inline-block; /* 必須設定為 inline-block，transform 才會生效 */
            position: relative; 
            z-index: 2;
        }

        /* 下方上鎖時間的區塊 (背景透明) */
        .lock-time-container {
            position: absolute;
            top: 82.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            background-color: transparent; 
            padding: 2px 0;
        }

        #lock-time {
            font-size: 5vw;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="main-time-container">
        <div id="live-time">00/00 00:00:00</div>
    </div>

    <div class="lock-time-container">
        <div id="lock-time">上鎖時間：03/08 23:16:39</div>
    </div>

    <script>
        // --- 設定即時跳動的當前時間 ---
        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('live-time').textContent = `${month}/${date} ${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
