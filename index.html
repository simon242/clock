<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機管控系統 MDM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="title">手機管控系統 MDM V1.0</div>
    </div>

    <div class="status-info">
        <div class="ios-version">iOS: 26.2.1</div>
        <div class="lock-status">已上鎖，可進入此管制營區</div>
    </div>

    <div class="main-content">
        <div class="camp-text">營區</div>
        <div class="live-time-display" id="live-time">03/08 23:24:02</div>
        
        <div class="button-group">
            <button class="btn btn-lock">
                <span class="dot-green"></span>
                上鎖：進入管制模式
            </button>
            <button class="btn btn-unlock">
                <span class="dot-red"></span>
                解鎖：離開管制模式
            </button>
        </div>
    </div>

    <div class="footer-content">
        <div class="info-row">上鎖時間：<span id="lock-time">03/08 23:16:39</span></div>
        <div class="info-row">設定檔：V1.03 (07/24 08:39:34)</div>
        <div class="warning-text">仿冒 必究</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 格式化主時間 (MM/DD HH:MM:SS)
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const liveTimeStr = `${month}/${date} ${hours}:${minutes}:${seconds}`;
            document.getElementById('live-time').textContent = liveTimeStr;

            // 計算並格式化上鎖時間 (比主時間早 7 分鐘 23 秒)
            const lockTime = new Date(now.getTime() - (7 * 60 + 23) * 1000);
            const lockMonth = String(lockTime.getMonth() + 1).padStart(2, '0');
            const lockDate = String(lockTime.getDate()).padStart(2, '0');
            const lockHours = String(lockTime.getHours()).padStart(2, '0');
            const lockMinutes = String(lockTime.getMinutes()).padStart(2, '0');
            const lockSeconds = String(lockTime.getSeconds()).padStart(2, '0');
            const lockTimeStr = `${lockMonth}/${lockDate} ${lockHours}:${lockMinutes}:${lockSeconds}`;
            document.getElementById('lock-time').textContent = lockTimeStr;
        }

        // 每秒更新一次
        setInterval(updateClock, 1000);
        updateClock(); // 初始呼叫以立即顯示時間
    </script>
</body>
</html>
